<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid World — Deterministic vs. Stochastic</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        height: 100%;
        background: #f5f6f8;
        color: #1a1a1a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 22px 24px 18px;
      }

      /* Tab toggle */
      .tabs {
        display: flex;
        background: #e4e6eb;
        border-radius: 999px;
        padding: 4px;
        margin-bottom: 14px;
      }
      .tab {
        background: transparent;
        color: #666;
        border: none;
        padding: 8px 22px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        transition: background 0.15s, color 0.15s;
      }
      .tab:hover { color: #1a1a1a; }
      .tab.active[data-mode="astar"] {
        background: #1473e6;
        color: #fff;
        box-shadow: 0 1px 4px rgba(20,115,230,0.35);
      }
      .tab.active[data-mode="mdp"] {
        background: #9256d9;
        color: #fff;
        box-shadow: 0 1px 4px rgba(146,86,217,0.35);
      }

      /* Formula bar */
      .formula {
        font-size: 14px;
        font-family: "SF Mono", Menlo, monospace;
        padding: 6px 16px;
        border-radius: 6px;
        margin-bottom: 14px;
        display: inline-block;
      }
      .formula.astar {
        background: rgba(20,115,230,0.08);
        border: 1px solid rgba(20,115,230,0.3);
        color: #0d66d0;
      }
      .formula.mdp {
        background: rgba(146,86,217,0.08);
        border: 1px solid rgba(146,86,217,0.3);
        color: #7a40bf;
      }

      canvas {
        background: #f5f6f8;
      }

      /* Controls */
      .controls { margin-top: 16px; }
      .astar-controls { display: flex; gap: 8px; }
      .mdp-controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      .arrow-grid {
        display: grid;
        grid-template-columns: 40px 40px 40px;
        grid-template-rows: 40px 40px;
        gap: 5px;
      }
      button {
        font-family: inherit;
        cursor: pointer;
        border: none;
        font-weight: 500;
        border-radius: 5px;
      }
      button:disabled { opacity: 0.4; cursor: default; }

      .btn-primary {
        background: #1473e6;
        color: white;
        padding: 9px 20px;
        font-size: 13px;
      }
      .btn-primary:hover:not(:disabled) { background: #0d66d0; }

      .btn-secondary {
        background: #e4e6eb;
        color: #1a1a1a;
        padding: 9px 16px;
        font-size: 13px;
      }
      .btn-secondary:hover:not(:disabled) { background: #d4d6db; }

      .arrow-btn {
        background: #9256d9;
        color: white;
        font-size: 17px;
        font-weight: 700;
      }
      .arrow-btn:hover:not(:disabled) { background: #7a40bf; }

      .stats {
        margin-top: 10px;
        font-size: 12px;
        color: #666;
        font-family: "SF Mono", Menlo, monospace;
        text-align: center;
      }
      .log {
        margin-top: 4px;
        font-size: 11px;
        color: #888;
        font-family: "SF Mono", Menlo, monospace;
        text-align: center;
        min-height: 16px;
      }
      .log .slip { color: #c05a00; font-weight: 600; }
      .log .reward-pos { color: #1a7a40; font-weight: 600; }
      .log .reward-neg { color: #b31a1a; font-weight: 600; }
      .hide { display: none; }
    </style>
  </head>
  <body>
    <div class="tabs">
      <button class="tab active" data-mode="astar">A* · Deterministic</button>
      <button class="tab" data-mode="mdp">MDP · Stochastic</button>
    </div>
    <div class="formula astar" id="formula">f(n) = g(n) + h(n)</div>
    <canvas id="grid"></canvas>
    <div class="controls">
      <div class="astar-controls" id="astar-controls">
        <button class="btn-primary" id="run">Run A*</button>
        <button class="btn-secondary" id="step">Step</button>
        <button class="btn-secondary" id="reset-astar">Reset</button>
      </div>
      <div class="mdp-controls hide" id="mdp-controls">
        <div class="arrow-grid">
          <button class="arrow-btn" id="up"    style="grid-column:2;grid-row:1">↑</button>
          <button class="arrow-btn" id="left"  style="grid-column:1;grid-row:2">←</button>
          <button class="arrow-btn" id="down"  style="grid-column:2;grid-row:2">↓</button>
          <button class="arrow-btn" id="right" style="grid-column:3;grid-row:2">→</button>
        </div>
        <button class="btn-secondary" id="reset-mdp">Reset</button>
      </div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="log" id="log">&nbsp;</div>

    <script>
      // ── Grid constants ──────────────────────────────────────────────────────
      const COLS = 4, ROWS = 3;
      const CELL = 110;
      const ML = 46, MB = 38;   // left/bottom margin for axis labels
      const CW = ML + COLS * CELL;
      const CH = ROWS * CELL + MB;

      const canvas = document.getElementById("grid");
      canvas.width  = CW;
      canvas.height = CH;
      const ctx = canvas.getContext("2d");

      // Grid cells in screen coords (x: 0-3 left→right, y: 0-2 top→bottom)
      // R&N image: start=(col1,row1)=screen(0,2), wall=(col2,row2)=screen(1,1),
      //            +1=(col4,row3)=screen(3,0),  -1=(col4,row2)=screen(3,1)
      const WALL     = { x: 1, y: 1 };
      const START    = { x: 0, y: 2 };
      const GOAL_POS = { x: 3, y: 0 };   // +1 terminal
      const TRAP_POS = { x: 3, y: 1 };   // −1 terminal

      // ── Shared helpers ──────────────────────────────────────────────────────
      function isWall(x, y) { return x === WALL.x && y === WALL.y; }
      function isGoal(x, y) { return x === GOAL_POS.x && y === GOAL_POS.y; }
      function isTrap(x, y) { return x === TRAP_POS.x && y === TRAP_POS.y; }
      function inBounds(x, y) { return x >= 0 && x < COLS && y >= 0 && y < ROWS; }

      // ── A* state ────────────────────────────────────────────────────────────
      let openList, closedList, path, running, timer;

      function makeNode(x, y, parent) {
        const g = parent ? parent.g + 1 : 0;
        const h = Math.abs(x - GOAL_POS.x) + Math.abs(y - GOAL_POS.y);
        return { x, y, g, h, f: g + h, parent };
      }

      function resetAstar() {
        openList = []; closedList = []; path = [];
        stopAstar();
        openList.push(makeNode(START.x, START.y, null));
        draw(); updateStats();
        document.getElementById("log").innerHTML = "&nbsp;";
      }

      function stepAstar() {
        if (path.length || !openList.length) { stopAstar(); return; }
        openList.sort((a, b) => a.f - b.f || a.h - b.h);
        const cur = openList.shift();
        closedList.push(cur);
        if (isGoal(cur.x, cur.y)) {
          let n = cur; while (n) { path.unshift(n); n = n.parent; }
          stopAstar(); draw(); updateStats(); return;
        }
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        for (const [dx, dy] of dirs) {
          const nx = cur.x + dx, ny = cur.y + dy;
          if (!inBounds(nx, ny) || isWall(nx, ny)) continue;
          if (isTrap(nx, ny)) continue; // avoid −1 in A* mode
          if (closedList.some(n => n.x === nx && n.y === ny)) continue;
          const tg = cur.g + 1;
          const ex = openList.find(n => n.x === nx && n.y === ny);
          if (!ex) openList.push(makeNode(nx, ny, cur));
          else if (tg < ex.g) { ex.g = tg; ex.f = tg + ex.h; ex.parent = cur; }
        }
        draw(); updateStats();
      }

      function stopAstar() {
        running = false;
        if (timer) { clearInterval(timer); timer = null; }
        const btn = document.getElementById("run");
        btn.textContent = "Run A*"; btn.disabled = false;
      }

      function runAstar() {
        if (running) return;
        running = true;
        document.getElementById("run").textContent = "Running…";
        document.getElementById("run").disabled = true;
        timer = setInterval(() => { stepAstar(); if (!running) clearInterval(timer); }, 120);
      }

      // ── MDP state ────────────────────────────────────────────────────────────
      const DELTA = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
      const PERP  = { up:["left","right"], down:["left","right"],
                      left:["up","down"],  right:["up","down"] };
      const ARROW = { up:"↑", down:"↓", left:"←", right:"→" };

      let pac, mdpStatus, mdpScore, mdpSteps;

      function resetMdp() {
        pac = { x: START.x, y: START.y, dir: "right" };
        mdpStatus = "alive"; mdpScore = 0; mdpSteps = 0;
        draw(); updateStats();
        document.getElementById("log").innerHTML = "&nbsp;";
      }

      function tryMove(pos, dir) {
        const [dx, dy] = DELTA[dir];
        const nx = pos.x + dx, ny = pos.y + dy;
        if (!inBounds(nx, ny) || isWall(nx, ny)) return pos;
        return { x: nx, y: ny };
      }

      function applyAction(intended) {
        if (mode !== "mdp" || mdpStatus !== "alive") return;
        const r = Math.random();
        const actual = r < 0.8 ? intended : r < 0.9 ? PERP[intended][0] : PERP[intended][1];
        const next = tryMove(pac, actual);
        pac = { x: next.x, y: next.y, dir: actual };
        mdpSteps++;

        let rewardNote = "";
        if (isGoal(pac.x, pac.y)) {
          mdpScore += 1; mdpStatus = "reached +1!"; rewardNote = "reward-pos";
        } else if (isTrap(pac.x, pac.y)) {
          mdpScore -= 1; mdpStatus = "fell into −1"; rewardNote = "reward-neg";
        } else {
          mdpScore -= 0.04; // small living cost
        }

        const slipped = actual !== intended;
        const logEl = document.getElementById("log");
        let line = `intended ${ARROW[intended]} → `;
        if (slipped) line += `<span class="slip">actual ${ARROW[actual]} (slip!)</span>`;
        else line += `actual ${ARROW[actual]}`;
        if (mdpStatus === "reached +1!")   line += ` &nbsp;<span class="reward-pos">+1 terminal</span>`;
        if (mdpStatus === "fell into −1") line += ` &nbsp;<span class="reward-neg">−1 terminal</span>`;
        logEl.innerHTML = line;

        draw(); updateStats();
      }

      // ── Drawing ──────────────────────────────────────────────────────────────
      let mode = "astar";

      function cellX(x) { return ML + x * CELL; }
      function cellY(y) { return y * CELL; }

      function draw() {
        ctx.clearRect(0, 0, CW, CH);
        ctx.fillStyle = "#f5f6f8";
        ctx.fillRect(0, 0, CW, CH);

        // cells
        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            drawCell(x, y);
          }
        }

        // A* overlays
        if (mode === "astar") {
          closedList.forEach(n => paintAstar(n, "rgba(146,86,217,0.18)", "#7a40bf"));
          openList.forEach(n  => paintAstar(n, "rgba(20,115,230,0.18)", "#0d66d0"));
          path.forEach(n => {
            if (isGoal(n.x, n.y)) return;
            ctx.fillStyle = "rgba(20,115,230,0.65)";
            ctx.fillRect(cellX(n.x)+24, cellY(n.y)+24, CELL-48, CELL-48);
          });
          drawStartLabel();
          drawGoalLabel();
          drawTrapLabel();
        } else {
          drawStartLabel();
          drawGoalLabel();
          drawTrapLabel();
          drawPacman();
        }

        drawAxisLabels();
      }

      function drawCell(x, y) {
        const cx = cellX(x), cy = cellY(y);
        if (isWall(x, y)) {
          ctx.fillStyle = "#9e9e9e";
          ctx.fillRect(cx, cy, CELL, CELL);
          ctx.fillStyle = "#8a8a8a";
          ctx.fillRect(cx + 4, cy + 4, CELL - 8, CELL - 8);
        } else if (isGoal(x, y)) {
          ctx.fillStyle = "#d4f4e2";
          ctx.fillRect(cx, cy, CELL, CELL);
        } else if (isTrap(x, y)) {
          ctx.fillStyle = "#fde8e8";
          ctx.fillRect(cx, cy, CELL, CELL);
        } else {
          ctx.fillStyle = "#ffffff";
          ctx.fillRect(cx, cy, CELL, CELL);
        }
        ctx.strokeStyle = "#c8cad0";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(cx + 0.75, cy + 0.75, CELL - 1.5, CELL - 1.5);
      }

      function drawStartLabel() {
        const cx = cellX(START.x), cy = cellY(START.y);
        ctx.fillStyle = "#2a6a2a";
        ctx.font = "bold 13px -apple-system, sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("START", cx + CELL / 2, cy + CELL / 2);
      }

      function drawGoalLabel() {
        const cx = cellX(GOAL_POS.x), cy = cellY(GOAL_POS.y);
        ctx.strokeStyle = "#1a7a40";
        ctx.lineWidth = 2;
        const bx = cx + 22, by = cy + 30, bw = 66, bh = 50;
        ctx.strokeRect(bx, by, bw, bh);
        ctx.fillStyle = "#1a7a40";
        ctx.font = "bold 22px -apple-system, sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("+1", cx + CELL / 2, cy + CELL / 2);
      }

      function drawTrapLabel() {
        const cx = cellX(TRAP_POS.x), cy = cellY(TRAP_POS.y);
        ctx.strokeStyle = "#b31a1a";
        ctx.lineWidth = 2;
        const bx = cx + 22, by = cy + 30, bw = 66, bh = 50;
        ctx.strokeRect(bx, by, bw, bh);
        ctx.fillStyle = "#b31a1a";
        ctx.font = "bold 22px -apple-system, sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("−1", cx + CELL / 2, cy + CELL / 2);
      }

      function drawAxisLabels() {
        ctx.fillStyle = "#888";
        ctx.font = "13px -apple-system, sans-serif";
        // column labels (1–4)
        for (let x = 0; x < COLS; x++) {
          ctx.textAlign = "center"; ctx.textBaseline = "top";
          ctx.fillText(x + 1, cellX(x) + CELL / 2, ROWS * CELL + 10);
        }
        // row labels (3 at top, 1 at bottom)
        for (let y = 0; y < ROWS; y++) {
          ctx.textAlign = "right"; ctx.textBaseline = "middle";
          ctx.fillText(ROWS - y, ML - 10, cellY(y) + CELL / 2);
        }
      }

      function paintAstar(n, fill, textColor) {
        if (isGoal(n.x, n.y) || isTrap(n.x, n.y) || isWall(n.x, n.y) ||
            (n.x === START.x && n.y === START.y)) return;
        ctx.fillStyle = fill;
        ctx.fillRect(cellX(n.x) + 1, cellY(n.y) + 1, CELL - 2, CELL - 2);
        ctx.fillStyle = textColor;
        ctx.textBaseline = "alphabetic";
        ctx.font = "bold 10px -apple-system, sans-serif";
        ctx.textAlign = "left";
        ctx.fillText("g" + n.g, cellX(n.x) + 6, cellY(n.y) + 16);
        ctx.textAlign = "right";
        ctx.fillText("h" + n.h, cellX(n.x) + CELL - 6, cellY(n.y) + 16);
        ctx.textAlign = "center";
        ctx.font = "bold 15px -apple-system, sans-serif";
        ctx.fillText("f" + n.f, cellX(n.x) + CELL / 2, cellY(n.y) + CELL - 10);
      }

      function drawPacman() {
        if (isGoal(pac.x, pac.y) || isTrap(pac.x, pac.y)) return;
        const cx = cellX(pac.x) + CELL / 2;
        const cy = cellY(pac.y) + CELL / 2;
        const r = CELL / 2 - 20;
        const base = { right: 0, down: Math.PI/2, left: Math.PI, up: -Math.PI/2 }[pac.dir];
        const mouth = 0.22 * Math.PI;
        ctx.fillStyle = "#f5b800";
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, base + mouth, base - mouth + 2 * Math.PI);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#c89000";
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }

      // ── Stats ─────────────────────────────────────────────────────────────────
      function updateStats() {
        const el = document.getElementById("stats");
        if (mode === "astar") {
          el.textContent = `expanded: ${closedList.length} · open: ${openList.length} · path: ${
            path.length ? path.length - 1 + " steps" : "—"
          }`;
        } else {
          el.textContent = `score: ${mdpScore.toFixed(2)} · steps: ${mdpSteps} · status: ${mdpStatus}`;
        }
      }

      // ── Mode switching ────────────────────────────────────────────────────────
      function setMode(m) {
        mode = m;
        document.querySelectorAll(".tab").forEach(t =>
          t.classList.toggle("active", t.dataset.mode === m)
        );
        const fEl = document.getElementById("formula");
        if (m === "astar") {
          fEl.textContent = "f(n) = g(n) + h(n)";
          fEl.className = "formula astar";
          document.getElementById("astar-controls").classList.remove("hide");
          document.getElementById("mdp-controls").classList.add("hide");
          resetAstar();
        } else {
          fEl.textContent = "P(intended) = 0.8  ·  P(slip ⊥) = 0.1 each";
          fEl.className = "formula mdp";
          document.getElementById("astar-controls").classList.add("hide");
          document.getElementById("mdp-controls").classList.remove("hide");
          resetMdp();
        }
      }

      // ── Event wiring ──────────────────────────────────────────────────────────
      document.querySelectorAll(".tab").forEach(t => { t.onclick = () => setMode(t.dataset.mode); });
      document.getElementById("run").onclick = runAstar;
      document.getElementById("step").onclick = () => { if (!running && mode === "astar") stepAstar(); };
      document.getElementById("reset-astar").onclick = resetAstar;
      ["up","down","left","right"].forEach(d => {
        document.getElementById(d).onclick = () => applyAction(d);
      });
      document.getElementById("reset-mdp").onclick = resetMdp;
      document.addEventListener("keydown", e => {
        const map = { ArrowUp:"up", ArrowDown:"down", ArrowLeft:"left", ArrowRight:"right" };
        if (mode === "mdp" && map[e.key]) { e.preventDefault(); applyAction(map[e.key]); }
        if (e.key.toLowerCase() === "r") { mode === "mdp" ? resetMdp() : resetAstar(); }
      });

      // ── Init ──────────────────────────────────────────────────────────────────
      setMode("astar");
    </script>
  </body>
</html>
